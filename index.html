<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resix Robotics</title>
    <style>
        /* Basic Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Essential Styling */
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            line-height: 1.6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            width: 100%;
            text-align: center;
        }

        h1 {
            font-size: clamp(2.5rem, 8vw, 4rem);
            font-weight: 800;
            margin-bottom: 0.5rem;
            letter-spacing: -1px;
        }

        p {
            font-size: clamp(1rem, 4vw, 1.25rem);
            color: #a0a0a0; /* Slightly dimmed for better readability */
            margin-bottom: 0.1rem;
        }

        .cta-button {
            display: inline-block;
            padding: 12px 24px;
            border: 2px solid #ffffff;
            color: #ffffff;
            text-decoration: none;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .cta-button:hover {
            background-color: #ffffff;
            color: #000000;
        }

        /* Mobile Adjustments */
        @media (max-width: 600px) {
            .container {
                text-align: left;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Resix Robotics</h1>
        <p>A.I. and Machine Learning for factory, quadra-ped, and humanoid robots</p>
	<p>Contact human at resix.bot for more info</p>
    </div>

</body>
</html>
